services:
  - type: web
    name: trello-timetracker
    runtime: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-timetracker-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: TRELLO_API_KEY
        sync: false
      - key: TRELLO_API_TOKEN
        sync: false
    healthCheckPath: /health

databases:
  - name: trello-timetracker-db
    plan: free
    databaseName: trello_timetracker
    user: postgres
