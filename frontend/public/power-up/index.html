<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trello Time Tracker</title>
  <script src="power-up.js"></script>
</head>
<body>
  <script>
    var APP_URL = window.location.origin;

    window.TrelloPowerUp.initialize({
      'card-buttons': function(t, opts) {
        return [{
          text: 'Time Tracker',
          callback: function() {
            var ctx = t.getContext();
            window.open(
              APP_URL + '/?view=card-timer&cardId=' + ctx.card + '&memberId=' + ctx.member,
              '_blank',
              'width=400,height=500'
            );
          }
        }];
      },

      'card-back-section': function(t, opts) {
        return {
          title: 'Time Tracking',
          content: {
            type: 'iframe',
            url: APP_URL + '/?view=card-history&cardId=' + t.getContext().card + '&memberId=' + t.getContext().member,
            height: 230
          }
        };
      },

      'board-buttons': function(t, opts) {
        return [{
          text: 'Dashboard',
          callback: function() {
            var ctx = t.getContext();
            window.open(
              APP_URL + '/?view=dashboard&memberId=' + ctx.member,
              '_blank',
              'width=800,height=600'
            );
          }
        }];
      },

      'card-badges': function(t, opts) {
        var ctx = t.getContext();
        var headers = { 'X-Trello-Member-Id': ctx.member };

        return Promise.all([
          fetch(APP_URL + '/api/v1/timers/active', { headers: headers })
            .then(function(r) { return r.ok ? r.json() : null; })
            .catch(function() { return null; }),
          fetch(APP_URL + '/api/v1/records/card-summary?card_id=' + ctx.card, { headers: headers })
            .then(function(r) { return r.ok ? r.json() : null; })
            .catch(function() { return null; })
        ])
        .then(function(results) {
          var timer = results[0];
          var summary = results[1];
          var badges = [];

          if (timer && timer.trello_card_id === ctx.card) {
            var elapsed = Math.floor((Date.now() - new Date(timer.started_at).getTime()) / 1000);
            badges.push({
              id: 'timer-badge',
              title: 'Active Timer',
              text: formatDuration(elapsed),
              color: 'green'
            });
          }

          if (summary && summary.total_sec > 0) {
            badges.push({
              id: 'time-badge',
              title: 'Total Time',
              text: formatDuration(summary.total_sec),
              color: 'blue'
            });
          }

          return badges;
        })
        .catch(function() { return []; });
      }
    });

    function formatDuration(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      var s = seconds % 60;
      return (h < 10 ? '0' : '') + h + ':' +
             (m < 10 ? '0' : '') + m + ':' +
             (s < 10 ? '0' : '') + s;
    }
  </script>
</body>
</html>
